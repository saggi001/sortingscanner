<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSMC Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #0a192f; color: white; text-align: center; font-family: sans-serif; }
        #reader { width: 100%; max-width: 400px; margin: 20px auto; border: 2px solid #00f2ff; border-radius: 10px; overflow: hidden; background: black; }
        .btn { background: #00f2ff; color: black; border: none; padding: 15px 30px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>CSMC Smart Scanner</h2>
    <div id="reader"></div>
    <button class="btn" id="start-btn" onclick="initScanner()">कॅमेरा सुरू करा</button>
    <div id="result" style="margin-top: 20px;"></div>

<script>
    const html5QrCode = new Html5Qrcode("reader");

    async function initScanner() {
        const startBtn = document.getElementById('start-btn');
        
        // आधी कॅमेरा परमिशन मागूया
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            stream.getTracks().forEach(track => track.stop()); // परमिशन मिळाल्यावर तात्पुरता कॅमेरा बंद करा
            
            startBtn.style.display = 'none'; // बटण लपवा
            
            // आता स्कॅनर सुरू करा
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    alert("स्कॅन यशस्वी: " + decodedText);
                },
                (errorMessage) => {
                    // स्कॅनिंग सुरू असताना एरर दुर्लक्षित करा
                }
            ).catch((err) => {
                alert("कॅमेरा सुरू झाला नाही: " + err);
                startBtn.style.display = 'block';
            });

        } catch (error) {
            alert("कृपया कॅमेरा परमिशन 'Allow' करा. एरर: " + error.message);
        }
    }
</script>
</body>
</html>
